
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vacation Picker</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(160deg, #fff8ef, #ffe3ef);
    color: #2f2140;
  }

  .app {
    width: 100%;
    max-width: 560px;
    text-align: center;
    padding: 24px;
    border-radius: 28px;
    background: rgba(255,255,255,0.84);
  }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(2rem, 6vw, 3.2rem);
  }

  .subtitle {
    margin: 0 0 24px;
    font-size: 1.1rem;
    color: #5d4a72;
  }

  .wheel-stage {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
  }

  .wheel-wrap {
    position: relative;
    width: min(92vw, 420px);
    aspect-ratio: 1 / 1;
  }

  .pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 34px solid #ff4b78;
    z-index: 5;
  }

  .wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: visible;
    transition: transform 5s ease-out;
    transform-origin: 50% 50%;
    display: block;
    filter: drop-shadow(0 12px 30px rgba(0,0,0,0.12));
  }

  .buttons {
    display: flex;
    justify-content: center;
    margin-top: 8px;
  }

  .spin {
    padding: 14px 24px;
    min-width: 240px;
    border: none;
    border-radius: 999px;
    font-weight: bold;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    background: linear-gradient(135deg, #22c55e, #16a34a);
  }

  .result {
    margin-top: 22px;
    padding: 20px;
    border: 2px dashed #dbc9ef;
    border-radius: 22px;
    background: rgba(255,255,255,0.72);
    min-height: 112px;
    font-size: 1rem;
    line-height: 1.55;
  }

  .result strong {
    display: block;
    font-size: 1.15rem;
    margin-bottom: 8px;
  }

  .again {
    margin-top: 12px;
    font-weight: 700;
    color: #6d5a84;
  }

  .wheel-label {
    font-weight: 800;
    fill: #2d2342;
    text-anchor: middle;
    dominant-baseline: middle;
    font-size: 18px;
  }

  .wheel-label.small {
    font-size: 15px;
  }

  @media (max-width: 480px) {
    .app { padding: 18px; }
    .wheel-wrap { width: min(94vw, 360px); }
    .spin { min-width: 220px; }
    .wheel-label { font-size: 16px; }
    .wheel-label.small { font-size: 13px; }
  }
</style>
</head>
<body>
  <div class="app">
    <h1>Vacation Picker</h1>
    <p class="subtitle">Spin the wheel to pick a vacation at random.</p>

    <div class="wheel-stage">
      <div class="wheel-wrap">
        <div class="pointer"></div>

        <svg id="wheel" class="wheel" viewBox="0 0 420 420" aria-label="Vacation picker wheel">
          <!-- white rim -->
          <circle cx="210" cy="210" r="204" fill="white"></circle>

          <!-- slices -->
          <path d="M 210 210 L 210.0 18.0 A 192 192 0 0 1 376.3 114.0 Z" fill="#ffd166"></path>
          <path d="M 210 210 L 376.3 114.0 A 192 192 0 0 1 376.3 306.0 Z" fill="#7fd3ff"></path>
          <path d="M 210 210 L 376.3 306.0 A 192 192 0 0 1 210.0 402.0 Z" fill="#b7f28f"></path>
          <path d="M 210 210 L 210.0 402.0 A 192 192 0 0 1 43.7 306.0 Z" fill="#ff9bc2"></path>
          <path d="M 210 210 L 43.7 306.0 A 192 192 0 0 1 43.7 114.0 Z" fill="#d1d5db"></path>
          <path d="M 210 210 L 43.7 114.0 A 192 192 0 0 1 210.0 18.0 Z" fill="#c7a7ff"></path>

          <!-- labels centered in slices along slice center line -->
          <g transform="translate(210 210)">
            <g transform="rotate(30) translate(0 -105)">
              <text class="wheel-label" transform="rotate(90)" x="0" y="-10">Beach</text>
            </g>

            <g transform="rotate(90) translate(0 -105)">
              <text class="wheel-label" transform="rotate(90)" x="0" y="-10">Ski Trip</text>
            </g>

            <g transform="rotate(150) translate(0 -105)">
              <text class="wheel-label small" transform="rotate(90)" x="0" y="-16">Amusement</text>
              <text class="wheel-label small" transform="rotate(90)" x="0" y="2">Park</text>
            </g>

            <g transform="rotate(210) translate(0 -105)">
              <text class="wheel-label small" transform="rotate(90)" x="0" y="-24">All-Inclusive</text>
              <text class="wheel-label small" transform="rotate(90)" x="0" y="-6">Resort</text>
            </g>

            <g transform="rotate(270) translate(0 -105)">
              <text class="wheel-label" transform="rotate(90)" x="0" y="-10">Other</text>
            </g>

            <g transform="rotate(330) translate(0 -105)">
              <text class="wheel-label" transform="rotate(90)" x="0" y="-10">Arkansas</text>
            </g>
          </g>

          <!-- center circle -->
          <circle cx="210" cy="210" r="44" fill="#f4f4f4" stroke="#eadcf8" stroke-width="10"></circle>
        </svg>
      </div>
    </div>

    <div class="buttons">
      <button class="spin" onclick="spin()">Spin the Wheel</button>
    </div>

    <div class="result" id="result">Ready to decide? Give the wheel a spin.</div>
  </div>

<script>
const options = [
  {
    label: "Beach",
    msg: "You should go to the beach with the A-Halls! Con: Wayne stays inside."
  },
  {
    label: "Ski Trip",
    msg: "Freeze your asses off and roll down a hill with the A-Halls. Con: Lindsay stays inside."
  },
  {
    label: "Amusement Park",
    msg: "Ride sweet rides, eat all the foods, and walk your asses off with the A-Halls!"
  },
  {
    label: "All-Inclusive Resort",
    msg: "Look into an easy vacation at a kid-friendly all-inclusive resort with the A-Halls and hope to not get kidnapped. Bonus: Watch the A-Hall kids in exchange for a night of them watching yours!"
  },
  {
    label: "Other",
    msg: "Find a city to explore that’s not too hot, or not too cold, but feels just right. Go with the A-Halls, of course, to maximize your experience."
  },
  {
    label: "Arkansas",
    msg: "Road trip to NWA and enjoy the heat with the A-Halls. Bonus: you may get to leave with a free diamond! Con: Wayno stays inside if it’s hot and not in a shaded pool."
  }
];

let rotation = 0;
let spinning = false;

function spin() {
  if (spinning) return;
  spinning = true;

  const pick = Math.floor(Math.random() * 6);
  const spins = Math.floor(Math.random() * 8) + 3;
  const offset = Math.floor(Math.random() * 31) - 15;
  const centerAngle = pick * 60 + 30;
  rotation += (spins * 360) + (360 - centerAngle) + offset;

  document.getElementById("wheel").style.transform = "rotate(" + rotation + "deg)";
  document.getElementById("result").innerHTML = "Spinning... <div class='again'>Where should the Johnsons go?</div>";

  setTimeout(() => {
    document.getElementById("result").innerHTML =
      "<strong>" + options[pick].label + "</strong>" +
      options[pick].msg;
    spinning = false;
  }, 5000);
}
</script>
</body>
</html>

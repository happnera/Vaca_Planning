<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Picker</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg1: #fff8ef;
      --bg2: #ffe3ef;
      --text: #2f2140;
      --muted: #5d4a72;
      --card: rgba(255,255,255,0.88);
      --green1: #22c55e;
      --green2: #16a34a;
      --pointer: #ff4b78;
      --rim: #ffffff;
      --hub: #f4f4f4;
      --hub-ring: #eadcf8;
      --border: #dbc9ef;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    .app {
      width: min(100%, 560px);
      text-align: center;
      padding: 24px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 14px 36px rgba(47,33,64,0.08);
      position: relative;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: clamp(1rem, 2.6vw, 1.1rem);
      color: var(--muted);
    }

    .wheel-stage {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .wheel-wrap {
      position: relative;
      width: min(92vw, 420px);
      aspect-ratio: 1 / 1;
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid var(--pointer);
      z-index: 6;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
    }

    .wheel {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 12px solid var(--rim);
      background: conic-gradient(
        from -30deg,
        #ffd166 0deg 60deg,
        #7fd3ff 60deg 120deg,
        #b7f28f 120deg 180deg,
        #ff9bc2 180deg 240deg,
        #d1d5db 240deg 300deg,
        #c7a7ff 300deg 360deg
      );
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      transition: transform 5.2s cubic-bezier(0.12, 0.95, 0.18, 1);
      overflow: hidden;
    }

    .wheel::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 72px;
      height: 72px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: var(--hub);
      border: 10px solid var(--hub-ring);
      z-index: 4;
    }

    .labels {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .label {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 112px;
      text-align: center;
      font-weight: 800;
      font-size: 16px;
      line-height: 1.05;
      color: #2d2342;
      transform-origin: center center;
      white-space: normal;
    }

    .label span { display: inline-block; }

    /* Centered within each slice, aligned with slice direction */
    .l0 { transform: translate(-50%, -50%) rotate(0deg) translateY(-108px) rotate(0deg); }
    .l1 { transform: translate(-50%, -50%) rotate(60deg) translateY(-108px) rotate(-60deg); }
    .l2 { transform: translate(-50%, -50%) rotate(120deg) translateY(-108px) rotate(-120deg); }
    .l3 { transform: translate(-50%, -50%) rotate(180deg) translateY(-108px) rotate(-180deg); }
    .l4 { transform: translate(-50%, -50%) rotate(240deg) translateY(-108px) rotate(-240deg); }
    .l5 { transform: translate(-50%, -50%) rotate(300deg) translateY(-108px) rotate(-300deg); }

    .buttons {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .spin {
      padding: 14px 24px;
      min-width: 240px;
      border: none;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--green1), var(--green2));
      box-shadow: 0 10px 20px rgba(22,163,74,0.18);
    }

    .spin:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .result {
      margin-top: 22px;
      padding: 20px;
      border: 2px dashed var(--border);
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      min-height: 112px;
      font-size: 1rem;
      line-height: 1.55;
    }

    .result strong {
      display: block;
      font-size: 1.15rem;
      margin-bottom: 8px;
    }

    .again {
      margin-top: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 18px;
      top: -20px;
      border-radius: 2px;
      opacity: 0.95;
      animation: fall linear forwards;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes fall {
      0%   { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate3d(var(--drift), 650px, 0) rotate(var(--spin)); opacity: 0; }
    }

    @media (max-width: 480px) {
      .app { padding: 18px; }
      .wheel-wrap { width: min(94vw, 360px); }
      .spin { min-width: 220px; }
      .label { width: 96px; font-size: 14px; }
      .l0, .l1, .l2, .l3, .l4, .l5 { }
      .l0 { transform: translate(-50%, -50%) rotate(0deg) translateY(-90px) rotate(0deg); }
      .l1 { transform: translate(-50%, -50%) rotate(60deg) translateY(-90px) rotate(-60deg); }
      .l2 { transform: translate(-50%, -50%) rotate(120deg) translateY(-90px) rotate(-120deg); }
      .l3 { transform: translate(-50%, -50%) rotate(180deg) translateY(-90px) rotate(-180deg); }
      .l4 { transform: translate(-50%, -50%) rotate(240deg) translateY(-90px) rotate(-240deg); }
      .l5 { transform: translate(-50%, -50%) rotate(300deg) translateY(-90px) rotate(-300deg); }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <h1>Vacation Picker</h1>
    <p class="subtitle">Spin the wheel to pick a vacation at random.</p>

    <div class="wheel-stage">
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
          <div class="labels">
            <div class="label l0"><span>Beach</span></div>
            <div class="label l1"><span>Ski Trip</span></div>
            <div class="label l2"><span>Amusement<br>Park</span></div>
            <div class="label l3"><span>All-Inclusive<br>Resort</span></div>
            <div class="label l4"><span>Other</span></div>
            <div class="label l5"><span>Arkansas</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="spin" id="spinBtn">Spin the Wheel</button>
    </div>

    <div class="result" id="result">Ready to decide? Give the wheel a spin.</div>
  </div>

  <script>
    const options = [
      {
        label: "Beach",
        msg: "You should go to the beach with the A-Halls! Con: Wayne stays inside."
      },
      {
        label: "Ski Trip",
        msg: "Freeze your asses off and roll down a hill with the A-Halls. Con: Lindsay stays inside."
      },
      {
        label: "Amusement Park",
        msg: "Ride sweet rides, eat all the foods, and walk your asses off with the A-Halls!"
      },
      {
        label: "All-Inclusive Resort",
        msg: "Look into an easy vacation at a kid-friendly all-inclusive resort with the A-Halls and hope to not get kidnapped. Bonus: Watch the A-Hall kids in exchange for a night of them watching yours!"
      },
      {
        label: "Other",
        msg: "Find a city to explore that’s not too hot, or not too cold, but feels just right. Go with the A-Halls, of course, to maximize your experience."
      },
      {
        label: "Arkansas",
        msg: "Road trip to NWA and enjoy the heat with the A-Halls. Bonus: you may get to leave with a free diamond! Con: Wayno stays inside if it’s hot and not in a shaded pool."
      }
    ];

    const wheel = document.getElementById('wheel');
    const result = document.getElementById('result');
    const spinBtn = document.getElementById('spinBtn');

    let rotation = 0;
    let spinning = false;
    let currentTargetIndex = 0;

    function launchConfetti() {
      const app = document.getElementById('app');
      const colors = ['#ff4b78', '#ffd166', '#7fd3ff', '#22c55e', '#c7a7ff', '#ff9bc2'];

      for (let i = 0; i < 70; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.2 + Math.random() * 1.6) + 's';
        piece.style.animationDelay = (Math.random() * 0.25) + 's';
        piece.style.setProperty('--drift', (Math.random() * 240 - 120) + 'px');
        piece.style.setProperty('--spin', (Math.random() * 900 - 450) + 'deg');
        app.appendChild(piece);
        setTimeout(() => piece.remove(), 4200);
      }
    }

    function spin() {
      if (spinning) return;

      spinning = true;
      spinBtn.disabled = true;

      currentTargetIndex = Math.floor(Math.random() * options.length);
      const spins = Math.floor(Math.random() * 8) + 3; // 3-10

      // Slice centers are at 0, 60, 120, 180, 240, 300 degrees from the top.
      // Rotating by -index*60 puts the chosen slice under the fixed top pointer.
      rotation += (spins * 360) - (currentTargetIndex * 60);

      wheel.style.transform = `rotate(${rotation}deg)`;
      result.innerHTML = 'Spinning... <div class="again">Where should the Johnsons go?</div>';

      setTimeout(() => {
        const landed = options[currentTargetIndex];
        result.innerHTML = `<strong>${landed.label}</strong>${landed.msg}`;
        launchConfetti();
        spinning = false;
        spinBtn.disabled = false;
      }, 5200);
    }

    spinBtn.addEventListener('click', spin);
  </script>
</body>
</html>

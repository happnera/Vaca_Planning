<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Picker</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg1:#fff8ef;
      --bg2:#ffe3ef;
      --text:#2f2140;
      --muted:#5d4a72;
      --card:rgba(255,255,255,0.88);
      --border:#dbc9ef;
      --green1:#22c55e;
      --green2:#16a34a;
      --pointer:#ff4b78;
    }

    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:8px 20px 20px;
      font-family:Arial, sans-serif;
      background:linear-gradient(160deg, var(--bg1), var(--bg2));
      color:var(--text);
    }

    .app{
      width:min(100%, 560px);
      text-align:center;
      padding:20px 24px 24px;
      border-radius:28px;
      background:var(--card);
      box-shadow:0 14px 36px rgba(47,33,64,0.08);
      position:relative;
      overflow:hidden;
      margin-top:0;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(2rem, 6vw, 3.2rem);
      line-height:1.05;
    }

    .subtitle{
      margin:0 0 20px;
      font-size:clamp(1rem, 2.6vw, 1.1rem);
      color:var(--muted);
    }

    .wheel-stage{
      width:100%;
      display:flex;
      justify-content:center;
      margin-bottom:22px;
    }

    .wheel-wrap{
      position:relative;
      width:min(92vw, 420px);
      aspect-ratio:1/1;
    }

    .pointer{
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:18px solid transparent;
      border-right:18px solid transparent;
      border-top:36px solid var(--pointer);
      z-index:5;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.16));
    }

    .wheel{
      width:100%;
      height:100%;
      display:block;
      transform-origin:50% 50%;
      transition:transform 5.2s cubic-bezier(0.12, 0.95, 0.18, 1);
      filter:drop-shadow(0 12px 30px rgba(0,0,0,0.12));
    }

    .buttons{
      display:flex;
      justify-content:center;
      margin-top:8px;
    }

    .spin{
      padding:14px 24px;
      min-width:240px;
      border:none;
      border-radius:999px;
      font-weight:700;
      font-size:1rem;
      color:white;
      cursor:pointer;
      background:linear-gradient(135deg, var(--green1), var(--green2));
      box-shadow:0 10px 20px rgba(22,163,74,0.18);
    }

    .spin:disabled{
      opacity:0.72;
      cursor:not-allowed;
    }

    .result{
      margin-top:22px;
      padding:20px;
      border:2px dashed var(--border);
      border-radius:22px;
      background:rgba(255,255,255,0.72);
      min-height:112px;
      font-size:1rem;
      line-height:1.55;
    }

    .result strong{
      display:block;
      font-size:1.15rem;
      margin-bottom:8px;
    }

    .again{
      margin-top:12px;
      font-weight:700;
      color:var(--muted);
    }

    .wheel-label{
      font-weight:800;
      fill:#2d2342;
      text-anchor:middle;
      dominant-baseline:middle;
      font-size:16px;
    }

    .confetti{
      position:absolute;
      width:10px;
      height:18px;
      top:-20px;
      border-radius:2px;
      opacity:0.95;
      animation:fall linear forwards;
      z-index:1;
      pointer-events:none;
    }

    @keyframes fall{
      0%   { transform:translate3d(0,0,0) rotate(0deg); opacity:1; }
      100% { transform:translate3d(var(--drift),650px,0) rotate(var(--spin)); opacity:0; }
    }

    @media (max-width:480px){
      body{ padding:4px 14px 16px; }
      .app{ padding:16px 18px 20px; }
      .wheel-wrap{ width:min(94vw, 360px); }
      .spin{ min-width:220px; }
      .wheel-label{ font-size:14px; }
      .subtitle{ margin-bottom:16px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <h1>Vacation Picker</h1>
    <p class="subtitle">Spin the wheel to pick a vacation at random.</p>

    <div class="wheel-stage">
      <div class="wheel-wrap">
        <div class="pointer"></div>
        <svg id="wheel" class="wheel" viewBox="0 0 420 420" aria-label="Vacation picker wheel"></svg>
      </div>
    </div>

    <div class="buttons">
      <button class="spin" id="spinBtn">Spin the Wheel</button>
    </div>

    <div class="result" id="result">Ready to decide? Give the wheel a spin.</div>
  </div>

  <script>
    const options = [
      {
        label: "Beach",
        shortLabel: ["Beach"],
        msg: "You should go to the beach with the A-Halls! Con: Wayne stays inside.",
        color: "#ffd166"
      },
      {
        label: "Ski Trip",
        shortLabel: ["Ski Trip"],
        msg: "Freeze your asses off and roll down a hill with the A-Halls. Con: Lindsay stays inside.",
        color: "#7fd3ff"
      },
      {
        label: "Amusement Park",
        shortLabel: ["Amusement", "Park"],
        msg: "Ride sweet rides, eat all the foods, and walk your asses off with the A-Halls!",
        color: "#b7f28f"
      },
      {
        label: "All-Inclusive Resort",
        shortLabel: ["All-Inclusive", "Resort"],
        msg: "Look into an easy vacation at a kid-friendly all-inclusive resort with the A-Halls and hope to not get kidnapped. Bonus: Watch the little A-Halls in exchange for a night of them watching yours!",
        color: "#ff9bc2"
      },
      {
        label: "Other",
        shortLabel: ["Other"],
        msg: "Find a city to explore that’s not too hot, or not too cold, but feels just right. Go with the A-Halls, of course, to maximize your experience.",
        color: "#d1d5db"
      },
      {
        label: "Arkansas",
        shortLabel: ["Arkansas"],
        msg: "Road trip to NWA and enjoy the heat with the A-Halls. Bonus: you may get to leave with a free diamond! Con: Wayne stays inside if it’s hot and not in a shaded pool.",
        color: "#c7a7ff"
      }
    ];

    const wheel = document.getElementById("wheel");
    const result = document.getElementById("result");
    const spinBtn = document.getElementById("spinBtn");

    let spinning = false;
    let targetIndex = 0;

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function polar(cx, cy, r, deg) {
      const rad = (deg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function slicePath(cx, cy, r, startDeg, endDeg) {
      const start = polar(cx, cy, r, startDeg);
      const end = polar(cx, cy, r, endDeg);
      const largeArc = endDeg - startDeg <= 180 ? 0 : 1;
      return `M ${cx} ${cy} L ${start.x.toFixed(1)} ${start.y.toFixed(1)} A ${r} ${r} 0 ${largeArc} 1 ${end.x.toFixed(1)} ${end.y.toFixed(1)} Z`;
    }

    function renderWheel() {
      const cx = 210;
      const cy = 210;
      const outerR = 192;
      const labelR = 112;

      let svg = `<circle cx="${cx}" cy="${cy}" r="204" fill="#ffffff"></circle>`;

      options.forEach((opt, i) => {
        const startDeg = i * 60 - 30;
        const endDeg = startDeg + 60;
        svg += `<path d="${slicePath(cx, cy, outerR, startDeg, endDeg)}" fill="${opt.color}"></path>`;
      });

      options.forEach((opt, i) => {
        const centerDeg = i * 60;
        svg += `<g transform="translate(${cx} ${cy}) rotate(${centerDeg}) translate(0 -${labelR}) rotate(90)">`;

        if (opt.shortLabel.length === 1) {
          svg += `<text class="wheel-label" x="0" y="0">${opt.shortLabel[0]}</text>`;
        } else {
          svg += `
            <text class="wheel-label" x="0" y="-10">
              <tspan x="0" dy="0">${opt.shortLabel[0]}</tspan>
              <tspan x="0" dy="18">${opt.shortLabel[1]}</tspan>
            </text>
          `;
        }

        svg += `</g>`;
      });

      svg += `<circle cx="210" cy="210" r="44" fill="#f4f4f4" stroke="#eadcf8" stroke-width="10"></circle>`;
      wheel.innerHTML = svg;
    }

    function launchConfetti() {
      const app = document.getElementById("app");
      const colors = ["#ff4b78", "#ffd166", "#7fd3ff", "#22c55e", "#c7a7ff", "#ff9bc2"];

      for (let i = 0; i < 70; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti";
        piece.style.left = Math.random() * 100 + "%";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.2 + Math.random() * 1.6) + "s";
        piece.style.animationDelay = (Math.random() * 0.25) + "s";
        piece.style.setProperty("--drift", (Math.random() * 240 - 120) + "px");
        piece.style.setProperty("--spin", (Math.random() * 900 - 450) + "deg");
        app.appendChild(piece);
        setTimeout(() => piece.remove(), 4200);
      }
    }

    function resetWheelForSpin() {
      wheel.style.transition = "none";
      wheel.style.transform = "rotate(0deg)";
      wheel.getBoundingClientRect();
      wheel.style.transition = "transform 5.2s cubic-bezier(0.12, 0.95, 0.18, 1)";
    }

    function spin() {
      if (spinning) return;

      spinning = true;
      spinBtn.disabled = true;
      result.innerHTML = `Spinning... <div class="again">Where should the Johnsons go?</div>`;

      // Uniform random answer across all 6 slices.
      targetIndex = randInt(0, options.length - 1);

      // Uniform random number of full spins from 3 to 10.
      const fullSpins = randInt(3, 10);

      // Small random offset that stays inside the chosen slice,
      // so the pointer does not always stop at the exact center.
      const offsetWithinSlice = randInt(-20, 20);

      resetWheelForSpin();

      // The chosen slice center is targetIndex * 60 from the top.
      // We rotate clockwise by full turns, then back to the chosen slice,
      // then apply a small in-slice offset.
      const finalRotation = (fullSpins * 360) - (targetIndex * 60) + offsetWithinSlice;

      requestAnimationFrame(() => {
        wheel.style.transform = `rotate(${finalRotation}deg)`;
      });
    }

    wheel.addEventListener("transitionend", (event) => {
      if (event.propertyName !== "transform" || !spinning) return;

      const landed = options[targetIndex];
      result.innerHTML = `<strong>${landed.label}</strong>${landed.msg}`;
      launchConfetti();

      spinning = false;
      spinBtn.disabled = false;
    });

    renderWheel();
    spinBtn.addEventListener("click", spin);
  </script>
</body>
</html>
